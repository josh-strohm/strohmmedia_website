<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AI Efficiency Assessment</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Take our AI Efficiency Assessment to evaluate your current capabilities and discover opportunities for AI-driven improvements in your workflows.">
    
    <script async src="https://tally.so/widgets/embed.js"></script>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

      html, body { 
        margin: 0; 
        padding: 0;
        height: 100%; 
        overflow: hidden; 
        background-color: #000000;
        font-family: 'Inter', sans-serif;
      }
      
      /* Pure Black Dynamic Background */
      body {
        background: linear-gradient(-45deg, #000000, #050505, #0a0a0a, #000000);
        background-size: 400% 400%;
        animation: gradientBG 20s ease infinite;
      }

      @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Subtle ambient orbs matching Tally's indigo/blue palette */
      .ambient-orb {
        position: absolute;
        filter: blur(120px);
        z-index: 1;
        opacity: 0.3;
        border-radius: 50%;
        pointer-events: none;
      }
      
      .orb-primary {
        top: -10%;
        left: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, rgba(79, 70, 229, 0) 70%); /* Indigo focus color */
        animation: float 18s ease-in-out infinite alternate;
      }
      
      .orb-secondary {
        bottom: -20%;
        right: -10%;
        width: 70vw;
        height: 70vw;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0) 70%); /* Blue accent color */
        animation: float 25s ease-in-out infinite alternate-reverse;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40px, -60px) scale(1.05); }
      }

      /* Iframe styling */
      iframe { 
        position: absolute; 
        top: 0; 
        right: 0; 
        bottom: 0; 
        left: 0; 
        border: 0; 
        z-index: 10;
        background: transparent;
      }

      /* Custom scrollbar for webkit browsers if needed (hidden by overflow:hidden, but for safety) */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Watermark Mask */
      .watermark-mask {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 220px;
        height: 80px;
        background-color: #000000;
        z-index: 100; /* Above the iframe */
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none; /* Allow interaction with the form underneath if needed, but the box itself blocks the watermark view */
      }

      .mask-content {
        color: rgba(79, 70, 229, 0.6);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 10px;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Dark aesthetic background elements -->
    <div class="ambient-orb orb-primary"></div>
    <div class="ambient-orb orb-secondary"></div>
    
    <!-- Watermark Mask -->
    <div class="watermark-mask">
      <div class="mask-content">AI Efficiency</div>
    </div>
    
    <!-- Tally Form Embed -->
    <iframe data-tally-src="https://tally.so/r/Med68Y?transparentBackground=1" width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0" title="AI Efficiency Assessment"></iframe>
  </body>
</html>
